name: Update total stars badge

on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute total stars and update README badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api --paginate \
            "users/${{ github.repository_owner }}/repos?per_page=100&type=owner" \
            --jq '.[] | select(.fork==false) | .stargazers_count' \
            | awk '{s+=$1} END{print s+0}')
          echo "Total stars across owned repos: $total"
          sed -i -E "s#(badge/Total%20stars-)[0-9]+#\1${total}#g" README.md
          if git diff --quiet -- README.md; then
            echo "Badge already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-update total stars badge to ${total}"
            git push
          fi
